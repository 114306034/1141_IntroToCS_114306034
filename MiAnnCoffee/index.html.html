<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多語系地點語音介紹 - 米安咖啡</title>
    <style>
        /* 基本網頁排版與美化 */
        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f0ec 0%, #e3d5c8 100%);
            color: #4a3f35;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(107, 84, 70, 0.15);
            text-align: center;
            max-width: 400px;
            width: 85%;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 語言選擇器樣式 */
        .lang-container {
            margin-bottom: 25px;
        }

        select {
            padding: 10px 16px;
            font-size: 15px;
            border-radius: 50px;
            border: 1px solid #d4c5b9;
            outline: none;
            cursor: pointer;
            background-color: #fdfaf7;
            color: #5c4d40;
            transition: all 0.3s ease;
            appearance: none;
            text-align: center;
            width: 140px;
            font-family: inherit;
        }

        select:hover, select:focus {
            border-color: #a68a73;
            box-shadow: 0 0 8px rgba(166, 138, 115, 0.2);
        }

        h1 {
            margin-top: 0;
            color: #5c4d40;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        p {
            color: #8c7b6d;
            margin-bottom: 35px;
            line-height: 1.6;
            font-size: 15px;
        }

        /* 播放按鈕樣式 */
        #play-btn {
            background-color: #a68a73;
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            gap: 12px;
            width: 100%;
            max-width: 220px;
            box-shadow: 0 8px 20px rgba(166, 138, 115, 0.3);
        }

        #play-btn:hover {
            background-color: #8c715c;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(140, 113, 92, 0.4);
        }

        #play-btn:active {
            transform: translateY(1px);
        }

        #play-btn:focus {
            outline: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="lang-container">
            <select id="lang-select">
                <option value="zh">繁體中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
            </select>
        </div>

        <h1 id="title">米安咖啡</h1>
        <p id="desc">點擊下方按鈕，聆聽本店的專屬語音導覽介紹。</p>
        
        <button id="play-btn">
            <span id="icon">🔊</span> 
            <span id="btn-text">播放介紹</span>
        </button>

        <audio id="audio-player" src="ttsmaker-file-2026-6-1-13-38-49.mp3"></audio>
    </div>

    <script>
        // --- 1. 多國語言翻譯與音檔設定 ---
        const languageData = {
            zh: {
                title: "米安咖啡",
                desc: "點擊下方按鈕，聆聽本店的專屬語音導覽介紹。",
                playText: "播放介紹",
                pauseText: "暫停介紹",
                audioSrc: "ttsmaker-file-2026-6-1-13-38-49.mp3" // 中文音檔檔名
            },
            en: {
                title: "Mi Ann Coffee",
                desc: "Click the button below to listen to the exclusive audio guide for our cafe.",
                playText: "Play Guide",
                pauseText: "Pause Guide",
                audioSrc: "ttsmaker-file-2026-6-1-13-47-9.mp3" // 英文音檔檔名
            },
            ja: {
                title: "ミアンコーヒー",
                desc: "下のボタンをクリックして、当店の専用音声ガイドをお聞きください。",
                playText: "再生する",
                pauseText: "一時停止",
                audioSrc: "ttsmaker-file-2026-6-1-13-49-9.mp3" // 日文音檔檔名
            },
            ko: {
                title: "미안 커피",
                desc: "아래 버튼을 클릭하여 저희 카페의 전용 오디오 가이드를 들어보세요.",
                playText: "재생하기",
                pauseText: "일시정지",
                audioSrc: "ttsmaker-file-2026-6-1-13-50-38.mp3" // 韓文音檔檔名
            }
        };

        // --- 2. 取得網頁元素 ---
        const langSelect = document.getElementById('lang-select');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('desc');
        const playBtn = document.getElementById('play-btn');
        const audioPlayer = document.getElementById('audio-player');
        const icon = document.getElementById('icon');
        const btnText = document.getElementById('btn-text');

        let isPlaying = false;
        let currentLang = 'zh'; // 預設語言

        // --- 3. 切換語言的功能 ---
        langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            const data = languageData[currentLang];

            // 停止正在播放的音樂
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            }

            // 更新網頁上的文字
            titleEl.textContent = data.title;
            descEl.textContent = data.desc;
            
            // 更新按鈕狀態與文字
            icon.textContent = '🔊';
            btnText.textContent = data.playText;

            // 替換成對應語言的音檔
            audioPlayer.src = data.audioSrc;
        });

        // --- 4. 點擊按鈕時的播放/暫停動作 ---
        playBtn.addEventListener('click', () => {
            const data = languageData[currentLang];

            if (isPlaying) {
                audioPlayer.pause();
                icon.textContent = '🔊';
                btnText.textContent = data.playText; // 顯示對應語言的「播放」
            } else {
                audioPlayer.play();
                icon.textContent = '⏸';
                btnText.textContent = data.pauseText; // 顯示對應語言的「暫停」
            }
            isPlaying = !isPlaying;
        });

        // --- 5. 當音檔播放完畢時，自動將按鈕重置 ---
        audioPlayer.addEventListener('ended', () => {
            const data = languageData[currentLang];
            isPlaying = false;
            icon.textContent = '🔊';
            btnText.textContent = data.playText;
        });
    </script>

</body>
</html>
